[build]
  command   = "npm run build"
  publish   = "dist"

[build.environment]
  NODE_VERSION = "20"

# ── Proxy /api/* to the Render backend ────────────────────────────────────────
# Netlify forwards these server-side — zero CORS issues.
[[redirects]]
  from   = "/api/*"
  to     = "https://indiwa-backend.onrender.com/api/:splat"
  status = 200
  force  = true

# ── SPA routing — send all non-API routes to index.html ───────────────────────
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
